name: Validate Templates

on:
  push:
    branches: [master]
    paths:
      - 'templates/**'
  pull_request:
    paths:
      - 'templates/**'

jobs:
  validate-nextjs-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Replace placeholders
        working-directory: templates/nextjs-static
        run: |
          sed -i 's/{{PROJECT_NAME}}/test-project/g' package.json
          sed -i 's/{{BRAND_NAME}}/Test Project/g' src/lib/constants.ts src/app/layout.tsx
          sed -i 's/{{DOMAIN}}/example.com/g' src/lib/constants.ts src/app/layout.tsx
          sed -i 's/{{DESCRIPTION}}/Test description for validation/g' src/lib/constants.ts src/app/layout.tsx
          sed -i 's/{{AUTHOR}}/Test Author/g' src/lib/constants.ts
          sed -i 's/{{GITHUB_USERNAME}}/test-user/g' src/lib/constants.ts
          sed -i 's/{{TWITTER_USERNAME}}/test-user/g' src/lib/constants.ts

      - name: Install dependencies
        working-directory: templates/nextjs-static
        run: bun install

      - name: Lint
        working-directory: templates/nextjs-static
        run: bun run lint

      - name: Type check
        working-directory: templates/nextjs-static
        run: bun run typecheck

      - name: Build
        working-directory: templates/nextjs-static
        run: bun run build

      - name: Verify output
        run: test -d templates/nextjs-static/out
