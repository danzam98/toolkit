version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/templates/nextjs-static"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    groups:
      nextjs:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      dev-deps:
        dependency-type: "development"

  - package-ecosystem: "npm"
    directory: "/cli"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "npm"
    directory: "/scripts"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
